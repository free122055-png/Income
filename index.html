<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 Camera System + Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f2027;
  color:white;
  text-align:center;
}

.section{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:#203a43;
}

video,canvas{
  border-radius:15px;
  margin-top:10px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00ffd5;
  margin:10px;
  cursor:pointer;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
}

img{
  width:150px;
  margin:10px;
  border-radius:10px;
}
</style>

</head>
<body>

<h1>📸 Camera Upload System</h1>

<!-- USER CAMERA -->
<div class="section">
  <h2>📸 Take Photo</h2>

  <video id="video" width="300" autoplay></video><br>

  <button onclick="capture()">Capture & Upload</button>

  <br>
  <canvas id="canvas" width="300" height="200"></canvas>
</div>

<!-- ADMIN LOGIN -->
<div class="section">
  <h2>🔐 Admin Panel</h2>

  <input id="adminPass" placeholder="Enter Password">
  <button onclick="loginAdmin()">Login</button>

  <div id="adminPanel" style="display:none;">
    <h3>👑 All Photos</h3>
    <div id="gallery"></div>
  </div>
</div>

<script>

// 🔥 Firebase Config বসাও
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

// camera open
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(()=>{
  alert("Camera permission denied ❌");
});

// capture + upload
function capture(){

  let ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0,300,200);

  let dataURL = canvas.toDataURL("image/png");

  let fileName = "photo_" + Date.now() + ".png";

  let ref = storage.ref("photos/" + fileName);

  ref.putString(dataURL, 'data_url')
  .then(()=>{
    alert("✅ Uploaded!");
  });

}

// admin login
function loginAdmin(){
  if(adminPass.value === "admin123"){
    document.getElementById("adminPanel").style.display="block";
    loadPhotos();
  }else{
    alert("Wrong Password ❌");
  }
}
