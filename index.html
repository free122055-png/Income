<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix Studio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:linear-gradient(270deg,#0f0f0f,#1a1a2e,#0f0f0f);
background-size:600% 600%;
animation:bg 12s infinite;
color:white;
padding-bottom:100px;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

header{
text-align:center;
padding:15px;
font-size:22px;
background:rgba(255,255,255,0.05);
}

/* section */
.section{display:none;padding:15px;min-height:100vh}
.active{display:block}

/* card */
.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

/* gallery */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.grid img{width:100%;border-radius:10px}

/* team */
.team{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.member{text-align:center;background:rgba(255,255,255,0.05);padding:10px;border-radius:15px}
.member img{width:80px;height:80px;border-radius:50%}

/* nav */
nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
}
nav button{
flex:1;
padding:10px;
background:none;
border:none;
color:white;
}
nav button.active{color:#7f5af0}

/* popup */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
}
.popup-box{
background:#1a1a2e;
padding:20px;
border-radius:15px;
text-align:center;
}

/* like */
.like{background:#7f5af0;padding:8px;border-radius:10px;display:inline-block;margin-top:10px}
</style>
</head>

<body>

<header>🔥 Zentrix Studio</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="card">
<h3>🔥 Update</h3>
<p>কাজ শুরু করো</p>
<div class="like" onclick="like()">❤️ Like (<span id="count">0</span>)</div>
</div>
</div>

<!-- GALLERY -->
<div id="gallery" class="section">
<div class="grid">
<img src="https://picsum.photos/300">
<img src="https://picsum.photos/301">
</div>
</div>

<!-- SCRIPT -->
<div id="script" class="section">
<div class="card">
<h3>🎬 Video</h3>
<video controls width="100%">
<source src="your-video.mp4">
</video>
</div>
</div>

<!-- TEAM -->
<div id="team" class="section">
<div class="team" id="teamList"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<img id="pimg" width="100">
<h3 id="pname"></h3>
<p id="prole"></p>
</div>
</div>

<!-- NAV -->
<nav>
<button onclick="show(event,'home')" class="active">🏠</button>
<button onclick="show(event,'gallery')">🖼️</button>
<button onclick="show(event,'script')">🎬</button>
<button onclick="show(event,'team')">👥</button>
</nav>

<script>
let sections=["home","gallery","script","team"];
let current=0;

/* show */
function show(e,id){
current=sections.indexOf(id);

document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
e.currentTarget.classList.add('active');
}

/* SAFE SWIPE */
let startX=0,startY=0;

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
let endY=e.changedTouches[0].clientY;

let dx=startX-endX;
let dy=startY-endY;

if(Math.abs(dx)>80 && Math.abs(dy)<50){
if(dx>0 && current<sections.length-1){current++}
if(dx<0 && current>0){current--}

document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(sections[current]).classList.add('active');
}
});

/* like */
let c=0;
function like(){c++;document.getElementById("count").innerText=c}

/* popup */
function openProfile(n,r,i){
document.getElementById("popup").style.display="flex";
pname.innerText=n;prole.innerText=r;pimg.src=i;
}
function closePopup(){popup.style.display="none"}

/* members */
let members=[
{name:"রহিম",role:"Editor",img:"https://i.pravatar.cc/101"},
{name:"করিম",role:"Designer",img:"https://i.pravatar.cc/102"},
{name:"রাকিব",role:"Editor",img:"https://i.pravatar.cc/103"},
{name:"সোহেল",role:"Manager",img:"https://i.pravatar.cc/104"},
{name:"জুবায়ের",role:"Script",img:"https://i.pravatar.cc/105"},
{name:"তানিম",role:"Marketer",img:"https://i.pravatar.cc/106"},
{name:"নাঈম",role:"Creator",img:"https://i.pravatar.cc/107"},
{name:"সাকিব",role:"Animator",img:"https://i.pravatar.cc/108"},
{name:"আরিফ",role:"Photo",img:"https://i.pravatar.cc/109"},
{name:"মেহেদী",role:"Editor",img:"https://i.pravatar.cc/110"},
{name:"শাহিন",role:"Designer",img:"https://i.pravatar.cc/111"},
{name:"হাসান",role:"Content",img:"https://i.pravatar.cc/112"},
{name:"ইমন",role:"Video",img:"https://i.pravatar.cc/113"},
{name:"রিফাত",role:"Editor",img:"https://i.pravatar.cc/114"},
{name:"তৌহিদ",role:"Designer",img:"https://i.pravatar.cc/115"},
{name:"ফাহিম",role:"Manager",img:"https://i.pravatar.cc/116"},
{name:"রুবেল",role:"Script",img:"https://i.pravatar.cc/117"},
{name:"সাজিদ",role:"Video",img:"https://i.pravatar.cc/118"},
{name:"তামিম",role:"Editor",img:"https://i.pravatar.cc/119"},
{name:"নাবিল",role:"Creator",img:"https://i.pravatar.cc/120"}
];

function loadMembers(){
let box=document.getElementById("teamList");
box.innerHTML="";
members.forEach(m=>{
box.innerHTML+=`
<div class="member" onclick="openProfile('${m.name}','${m.role}','${m.img}')">
<img src="${m.img}">
<h4>${m.name}</h4>
</div>`;
});
}
loadMembers();
</script>

</body>
