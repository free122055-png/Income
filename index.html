<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background: linear-gradient(135deg,#0f0f0f,#1a1a2e);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:700;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  position:sticky;
  top:0;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#111;
}

nav button{
  background:none;
  border:none;
  color:white;
  font-size:14px;
}

/* SECTIONS */
.section{
  display:none;
  padding:15px;
  animation:fade 0.5s ease;
}

.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* CARD */
.card{
  background: rgba(255,255,255,0.05);
  padding:15px;
  margin-bottom:15px;
  border-radius:15px;
  backdrop-filter: blur(10px);
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* IMAGE */
.card img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* TEAM */
.team{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.member{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:15px;
  text-align:center;
}

.member img{
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid #7f5af0;
}

/* SEARCH */
input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

/* BUTTON */
.like{
  margin-top:10px;
  padding:5px 10px;
  border:none;
  border-radius:8px;
  background:#7f5af0;
  color:white;
}

/* FOOTER */
footer{
  text-align:center;
  padding:10px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>🔥 Zentrix Studio</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('announce')">Updates</button>
<button onclick="show('gallery')">Gallery</button>
<button onclick="show('team')">Team</button>
<button onclick="show('about')">About</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h3>আজকের আপডেট</h3>
    <p>সবাই কাজ শুরু করো 🔥</p>
    <img src="https://picsum.photos/400">
    <button class="like" onclick="like()">❤️ Like</button>
  </div>
</div>

<!-- ANNOUNCEMENT -->
<div id="announce" class="section">
  <div class="card">
    <h3>Important Notice</h3>
    <p>আজ রাত ১০টার মধ্যে কাজ শেষ করো</p>
  </div>
</div>

<!-- GALLERY -->
<div id="gallery" class="section">
  <div class="card">
    <img src="https://picsum.photos/401">
  </div>
  <div class="card">
    <img src="https://picsum.photos/402">
  </div>
</div>

<!-- TEAM -->
<div id="team" class="section">
  <input type="text" placeholder="Search member...">

  <div class="team">

    <div class="member">
      <img src="https://i.pravatar.cc/100">
      <h4>Rahim</h4>
      <p>Editor</p>
    </div>

    <div class="member">
      <img src="https://i.pravatar.cc/101">
      <h4>Karim</h4>
      <p>Designer</p>
    </div>

  </div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
  <div class="card">
    <h3>About Zentrix Studio</h3>
    <p>আমরা একটি professional content creator team 🚀</p>
  </div>
</div>

<footer>© Zentrix Studio</footer>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function like(){
  alert("Liked ❤️");
}
</script>

</body>
</html>￼EnterYPE html>
