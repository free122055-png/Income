<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(270deg,#0f0f0f,#1a1a2e,#0f0f0f);
background-size:600% 600%;
animation:bg 12s infinite;
color:white;
padding-bottom:95px;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

header{
text-align:center;
padding:18px;
font-size:22px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(127,90,240,0.4);
}

/* SECTION */
.section{
display:none;
padding:15px;
min-height:100vh;
}
.active{display:block;animation:fade .4s;}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:18px;
margin-bottom:15px;
transition:.3s;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(127,90,240,0.5);
}

.card img{
width:100%;
border-radius:12px;
margin-top:10px;
transition:.3s;
}
.card img:hover{
transform:scale(1.05);
filter:brightness(1.2);
}

/* GALLERY */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.grid img{
width:100%;
border-radius:12px;
transition:.3s;
}
.grid img:hover{
transform:scale(1.06);
filter:brightness(1.25);
box-shadow:0 0 15px rgba(127,90,240,0.5);
}

/* TEAM */
.team{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.member{
text-align:center;
padding:12px;
border-radius:15px;
background:rgba(255,255,255,0.05);
transition:.3s;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}
.member:hover{
transform:translateY(-6px);
box-shadow:0 12px 25px rgba(127,90,240,0.6);
}

.member img{
width:100%;
height:auto;
border-radius:12px;
object-fit:contain;
border:2px solid #7f5af0;
transition:.3s;
}
.member img:hover{
transform:scale(1.05);
filter:brightness(1.1);
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:10px;
background:rgba(255,255,255,0.1);
color:white;
outline:none;
}
input:focus{
box-shadow:0 0 10px #7f5af0;
}

/* NAV */
nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#000;
padding:10px 0;
z-index:999;
box-shadow:0 -5px 15px rgba(0,0,0,0.5);
}

nav button{
flex:1;
border:none;
background:none;
color:white;
font-size:13px;
transition:.3s;
}
nav button span{
display:block;
font-size:22px;
}
nav button:hover{
transform:scale(1.1);
color:#7f5af0;
}
nav button.active{
color:#7f5af0;
}

footer{
text-align:center;
padding:10px;
opacity:.5;
}
</style>
</head>

<body>

<header>🔥 Zentrix Studio</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="card">
<h3>🔥 বর্তমান আপডেট</h3>
<p>সবাই কাজ শুরু করো</p>
<img src="https://i.postimg.cc/3w8HZNdC/20260409-115049.jpg">
</div>
</div>

<!-- UPDATE -->
<div id="announce" class="section">
<div class="card"><h3>📢 Update</h3><p>খুব শিঘ্রই শুটিং শুরু হবে</p></div>
</div>

<!-- GALLERY -->
<div id="gallery" class="section">
<div class="grid">
<img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc">
<img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf">
<img src="https://images.unsplash.com/photo-1587620962725-abab7fe55159">
<img src="https://images.unsplash.com/photo-1611162616475-46b635cb6868">
<img src="https://images.unsplash.com/photo-1611224923853-80b023f02d71">
<img src="https://images.unsplash.com/photo-1581291518633-83b4ebd1d83e">
</div>
</div>
