<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Live Chat App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f2027;
  color:white;
}

/* Header */
.header{
  text-align:center;
  padding:15px;
  background:#203a43;
  font-size:20px;
}

/* Chat Box */
.chat{
  height:70vh;
  overflow:auto;
  padding:10px;
}

/* Message */
.msg{
  background:#2c5364;
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}

.me{
  background:#00ffd5;
  color:black;
  text-align:right;
}

/* Input */
.inputBox{
  display:flex;
  padding:10px;
  background:#203a43;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-right:5px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00ffd5;
}
</style>

</head>
<body>

<div class="header">💬 Live Chat</div>

<div id="chat" class="chat"></div>

<div class="inputBox">
  <input id="name" placeholder="Your name">
  <input id="msg" placeholder="Type message">
  <button onclick="send()">Send</button>
</div>

<script>

// 🔥 👉 এখানে তোর Supabase বসানো আছে
const supabaseClient = supabase.createClient(
  "https://lvlxzmgaacaceqjiyftx.supabase.co",
  "sb_publishable_NX1R6n2lVQ7nEaZgOW3Vwg_fP1hX9yP"
);

// SEND MESSAGE
async function send(){
  let name = document.getElementById("name").value;
  let text = document.getElementById("msg").value;

  if(!name || !text){
    alert("Name আর message লিখ");
    return;
  }

  await supabaseClient.from("messages").insert([
    { name:name, text:text }
  ]);

  document.getElementById("msg").value="";
}

// LOAD MESSAGE
async function load(){
  let { data } = await supabaseClient
    .from("messages")
    .select("*")
    .order("id",{ascending:true});

  let chat = document.getElementById("chat");
  chat.innerHTML="";

  data.forEach(m=>{
    chat.innerHTML += `
      <div class="msg">
        <b>${m.name}:</b> ${m.text}
      </div>
    `;
  });

  chat.scrollTop = chat.scrollHeight;
}

// REALTIME
supabaseClient
  .channel('chat')
  .on(
    'postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'messages' },
    payload => {
      load();
    }
  )
  .subscribe();

load();

</script>

</body>
</html>
